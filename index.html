<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تخمين الأكواد - إصدار الوصول الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --primary: #06b6d4;
            --dark: #0f172a;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--dark);
            color: #e2e8f0;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .terminal-bg {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.95));
            border: 1px solid rgba(51, 65, 85, 1);
        }

        .scanning-line {
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            position: absolute;
            width: 100%;
            animation: scan 3s linear infinite;
            display: none;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .btn-glow:hover {
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        .status-badge {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row items-center justify-between mb-8 gap-4">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-cyan-500/10 rounded-xl border border-cyan-500/50">
                    <i class="fas fa-shield-virus text-3xl text-cyan-400"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-white tracking-tight">نظام الحقن المباشر <span class="text-cyan-400 italic">PRO</span></h1>
                    <p class="text-slate-400 text-sm">واجهة التحكم بالبروتوكول المتسلسل و ADB Bridge</p>
                </div>
            </div>
            
            <div id="connectionStatus" class="flex items-center gap-3 bg-slate-800/80 px-6 py-2 rounded-full border border-slate-700 status-badge">
                <span class="relative flex h-3 w-3">
                    <span id="pingIcon" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span id="dotIcon" class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                </span>
                <span id="statusText" class="text-sm font-bold uppercase tracking-wider">OFFLINE</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Side Panel -->
            <div class="lg:col-span-4 space-y-6">
                <!-- Connection Manager -->
                <div class="terminal-bg rounded-2xl p-6 shadow-2xl">
                    <h2 class="text-white font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-link text-cyan-400"></i> مدير الاتصال الفعلي
                    </h2>
                    
                    <div class="space-y-4">
                        <div class="bg-red-500/10 border border-red-500/30 p-3 rounded-lg text-[11px] text-red-200" id="errorNotice">
                            <i class="fas fa-info-circle ml-1"></i> إذا لم يظهر الجهاز، تأكد من تثبيت تعريفات <b>USB VCOM</b> وتفعيل <b>ADB</b>.
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="requestSerial()" class="bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-bold py-3 rounded-lg transition-all btn-glow">
                                <i class="fas fa-usb mb-1 block text-lg"></i> USB SERIAL
                            </button>
                            <button onclick="simulateADB()" class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold py-3 rounded-lg transition-all">
                                <i class="fas fa-bug mb-1 block text-lg"></i> ADB BRIDGE
                            </button>
                        </div>

                        <button id="disconnectBtn" onclick="forceDisconnect()" class="hidden w-full bg-red-600/20 text-red-400 border border-red-600/50 py-2 rounded-lg text-sm hover:bg-red-600 hover:text-white transition-all">
                            فصل الاتصال الحالي
                        </button>
                    </div>
                </div>

                <!-- Parameters -->
                <div class="terminal-bg rounded-2xl p-6 shadow-2xl">
                    <h2 class="text-white font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-sliders-h text-cyan-400"></i> إعدادات النبضة
                    </h2>
                    <div class="space-y-4">
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] text-slate-500 uppercase font-bold">نمط التخمين</label>
                            <select id="attackMode" class="bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:ring-2 ring-cyan-500 outline-none">
                                <option value="brute">هجوم شامل (Brute Force)</option>
                                <option value="smart">تخمين ذكي (Common PINs)</option>
                                <option value="custom">مخصص (Pattern Based)</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] text-slate-500 uppercase font-bold">التأخير بين المحاولات (ms)</label>
                            <input type="number" id="msDelay" value="400" step="50" min="10" class="bg-slate-900 border border-slate-700 rounded-lg p-3 text-cyan-400 mono outline-none">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Terminal -->
            <div class="lg:col-span-8">
                <div class="terminal-bg rounded-2xl overflow-hidden shadow-2xl flex flex-col h-[650px] relative">
                    <div id="scanner" class="scanning-line"></div>
                    
                    <!-- Terminal Header -->
                    <div class="bg-slate-800/50 px-6 py-3 border-b border-slate-700 flex justify-between items-center">
                        <span class="text-[10px] text-slate-400 font-mono tracking-widest">ENCRYPTED_DATA_STREAM</span>
                        <div id="bitrate" class="text-[10px] text-emerald-500 font-mono hidden">0.00 KB/S</div>
                    </div>

                    <!-- Visual Feedback -->
                    <div class="p-8 flex flex-col items-center justify-center bg-black/20">
                        <div class="text-[10px] text-cyan-500/40 uppercase mb-2 font-bold tracking-[0.4em]">Current Injected Code</div>
                        <div id="displayCode" class="text-7xl md:text-9xl font-black text-white mono tracking-tighter drop-shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                            ----
                        </div>
                        <div id="progressContainer" class="w-full max-w-md mt-6 bg-slate-800 h-1.5 rounded-full overflow-hidden hidden">
                            <div id="progressBar" class="bg-cyan-500 h-full w-0 transition-all duration-300"></div>
                        </div>
                    </div>

                    <!-- Console -->
                    <div id="terminalConsole" class="flex-grow bg-black/40 m-6 rounded-xl p-4 mono text-[11px] overflow-y-auto border border-slate-800 text-emerald-500/70 custom-scroll">
                        <div class="text-slate-500 italic">>> تمهيد النظام... بانتظار استجابة العتاد..</div>
                    </div>

                    <!-- Control Bar -->
                    <div class="p-6 pt-0 flex gap-4">
                        <button id="startAction" disabled onclick="startInjection()" class="flex-grow bg-cyan-600 disabled:opacity-30 text-white font-black py-4 rounded-xl hover:bg-cyan-500 transition-all flex items-center justify-center gap-3">
                            <i class="fas fa-play"></i> بـدء الـحقـن
                        </button>
                        <button id="stopAction" onclick="stopInjection()" class="hidden flex-grow bg-red-600 text-white font-black py-4 rounded-xl hover:bg-red-500 transition-all flex items-center justify-center gap-3">
                            <i class="fas fa-stop"></i> إيـقـاف
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let serialPort = null;
        let serialWriter = null;
        let injectionInterval = null;
        let isSimulated = false;

        const terminal = document.getElementById('terminalConsole');
        const display = document.getElementById('displayCode');
        const statusText = document.getElementById('statusText');
        const startBtn = document.getElementById('startAction');

        function addLog(msg, type = 'info') {
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            const colors = {
                'info': 'text-cyan-400',
                'error': 'text-red-500',
                'success': 'text-emerald-400',
                'system': 'text-slate-500'
            };
            div.className = `mb-1 ${colors[type]}`;
            div.innerHTML = `<span class="text-[9px] font-mono mr-2">[${time}]</span> ${msg}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // --- وظيفة التوصيل المتسلسل (Serial) ---
        async function requestSerial() {
            if (!("serial" in navigator)) {
                addLog("المتصفح لا يدعم الوصول المباشر للـ USB. استخدم Chrome.", "error");
                return;
            }
            try {
                addLog("طلب الوصول إلى المنفذ المتسلسل...", "system");
                serialPort = await navigator.serial.requestPort();
                await serialPort.open({ baudRate: 9600 });
                serialWriter = serialPort.writable.getWriter();
                setConnected(true, "SERIAL ACTIVE");
                addLog("تم الربط بنجاح مع COM PORT.", "success");
            } catch (e) {
                addLog("فشل الارتباط: لم يتم اختيار جهاز أو أن المنفذ مشغول.", "error");
            }
        }

        // --- محاكاة ADB (للهواتف التي لا تظهر كـ Serial) ---
        function simulateADB() {
            addLog("محاكاة اتصال ADB Bridge...", "system");
            setTimeout(() => {
                isSimulated = true;
                setConnected(true, "ADB BRIDGE READY");
                addLog("تم التعرف على جهاز Android عبر وضع التصحيح.", "success");
                addLog("تحذير: التوصيل عبر ADB يتطلب صلاحيات Root لبعض العمليات.", "info");
            }, 1000);
        }

        function setConnected(connected, text) {
            const dot = document.getElementById('dotIcon');
            const ping = document.getElementById('pingIcon');
            const discBtn = document.getElementById('disconnectBtn');
            const errorNotice = document.getElementById('errorNotice');

            if (connected) {
                statusText.innerText = text;
                statusText.className = "text-sm font-bold uppercase tracking-wider text-emerald-400";
                dot.className = "relative inline-flex rounded-full h-3 w-3 bg-emerald-500";
                ping.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75";
                startBtn.disabled = false;
                discBtn.classList.remove('hidden');
                errorNotice.classList.add('hidden');
                document.getElementById('bitrate').classList.remove('hidden');
            } else {
                statusText.innerText = "OFFLINE";
                statusText.className = "text-sm font-bold uppercase tracking-wider text-red-500";
                dot.className = "relative inline-flex rounded-full h-3 w-3 bg-red-500";
                ping.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75";
                startBtn.disabled = true;
                discBtn.classList.add('hidden');
                errorNotice.classList.remove('hidden');
            }
        }

        async function startInjection() {
            const delay = parseInt(document.getElementById('msDelay').value);
            const mode = document.getElementById('attackMode').value;
            
            document.getElementById('startAction').classList.add('hidden');
            document.getElementById('stopAction').classList.remove('hidden');
            document.getElementById('scanner').style.display = 'block';
            document.getElementById('progressContainer').classList.remove('hidden');

            addLog(`بدء حقن الأكواد بنمط ${mode}...`, "success");

            let count = 0;
            injectionInterval = setInterval(async () => {
                count++;
                let code = Math.floor(1000 + Math.random() * 9000).toString();
                display.innerText = code;
                
                // التحديث البصري
                document.getElementById('progressBar').style.width = (count % 100) + "%";
                document.getElementById('bitrate').innerText = (Math.random() * 5).toFixed(2) + " KB/S";

                // الإرسال الحقيقي إذا كان متصلاً بالـ Serial
                if (serialWriter) {
                    const encoder = new TextEncoder();
                    await serialWriter.write(encoder.encode(code + "\n"));
                }

                if (count % 10 === 0) {
                    addLog(`تم حقن الشحنة ${code} - استجابة الجهاز: [REJECTED]`, "info");
                }
            }, delay);
        }

        function stopInjection() {
            clearInterval(injectionInterval);
            document.getElementById('startAction').classList.remove('hidden');
            document.getElementById('stopAction').classList.add('hidden');
            document.getElementById('scanner').style.display = 'none';
            addLog("تم إيقاف عملية الحقن يدوياً.", "error");
        }

        function forceDisconnect() {
            stopInjection();
            if (serialWriter) {
                serialWriter.releaseLock();
                serialWriter = null;
            }
            if (serialPort) {
                serialPort.close();
                serialPort = null;
            }
            isSimulated = false;
            setConnected(false);
            addLog("تم قطع الاتصال وتطهير المنافذ.", "system");
        }
    </script>
</body>
</html>
