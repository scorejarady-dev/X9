name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prepare Web Files (www)
        run: |
          # إنشاء مجلد www إذا لم يكن موجوداً
          mkdir -p www
          
          # إذا كان ملف index.html موجوداً في المسار الرئيسي، قم بنسخ ملفات الموقع إلى www
          # نتجاهل نسخ المجلدات الخاصة بـ git و node_modules لتجنب تضخم التطبيق
          if [ -f index.html ]; then
            rsync -av --exclude='www' --exclude='.git' --exclude='node_modules' --exclude='.github' ./ www/
          else
            echo "<html><body><h1>مرحباً بك في تطبيق X1</h1><p>الرجاء رفع ملفات موقعك هنا.</p></body></html>" > www/index.html
          fi

      - name: Install Capacitor Dependencies
        run: |
          npm init -y
          # تثبيت المكتبات الأساسية لـ Capacitor
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli

      - name: Initialize Capacitor Config
        run: |
          # إنشاء ملف الإعدادات وتوجيهه إلى مجلد www بدلاً من المسار الرئيسي
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.x1.app",
            "appName": "X1 System",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF

      - name: Add & Sync Android Platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          # إعطاء صلاحية التشغيل لملف gradlew
          chmod +x gradlew
          # بناء التطبيق
          ./gradlew assembleDebug

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Android-App-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
